{% extends 'base.html' %}
{% block title %}Realizar Pago{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex align-items-center mb-3">
        <a href="{{ url_for('patient_order_status', prescription_id=order.prescription_id) }}" class="btn btn-outline-secondary btn-sm me-3">
            <i class="bi bi-arrow-left"></i> Volver
        </a>
        <h4 class="fw-bold">Completar Pago con Bitfarma</h4>
    </div>

    <div class="card shadow-sm border-0" style="height: 70vh; overflow: hidden;">
        <iframe 
            src="{{ payment_url }}" 
            width="100%" 
            height="100%" 
            frameborder="0" 
            allow="clipboard-write"
            title="Pasarela de Pago">
        </iframe>
    </div>
</div>
{% endblock %}
